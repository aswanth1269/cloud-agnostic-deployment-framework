apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-agnostic-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/cloud-agnostic-deployment-framework.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: gcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
